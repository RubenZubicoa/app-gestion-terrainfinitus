<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="isEditing ? 'Editar marca' : 'Agregar marca'"
>
  <div class="max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-xl border border-slate-200 bg-white p-6 shadow-xl">
    <h2 class="text-lg font-semibold text-slate-900">
      {{ isEditing ? 'Editar marca' : 'Agregar marca' }}
    </h2>

    <form class="mt-4 space-y-4" [formGroup]="form" (submit)="onSubmit($event)">
      <div>
        <label for="brand-name" class="block text-sm font-medium text-slate-700">Nombre</label>
        <input
          id="brand-name"
          type="text"
          formControlName="name"
          class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
        />
      </div>

      <div>
        <label for="brand-description" class="block text-sm font-medium text-slate-700">
          Descripción
        </label>
        <textarea
          id="brand-description"
          formControlName="description"
          rows="3"
          class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
        ></textarea>
      </div>

      <div>
        <span class="block text-sm font-medium text-slate-700">Logo</span>
        <input
          #logoInput
          id="brand-logo"
          type="file"
          accept="image/*"
          (change)="onLogoSelected($event)"
          class="sr-only"
        />

        <button
          type="button"
          (click)="logoInput.click()"
          class="mt-1 inline-flex items-center gap-2 rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
        >
          <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path
              d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z"
            />
          </svg>
          Seleccionar logo del PC
        </button>

        @if (hasExistingLogo) {
          <div class="mt-3">
            <p class="text-xs font-medium uppercase tracking-wide text-slate-500">Logo actual</p>
            <div class="relative mt-2 inline-block">
              <img
                [src]="existingLogoUrl()"
                alt="Logo actual de la marca"
                class="h-16 w-16 rounded-lg border border-slate-200 object-cover"
                (error)="onExistingLogoError()"
              />
              <button
                type="button"
                (click)="removeExistingLogo()"
                class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-slate-900 text-xs text-white transition hover:bg-slate-700"
                aria-label="Eliminar logo actual"
              >
                ×
              </button>
            </div>
          </div>
        }

        @if (hasLogoPreview) {
          <div class="mt-3">
            <p class="text-xs font-medium uppercase tracking-wide text-slate-500">Nuevo logo</p>
            <div class="relative mt-2 inline-block">
              <img
                [src]="logoPreview()!.previewUrl"
                [alt]="logoPreview()!.file.name"
                [title]="logoPreview()!.file.name"
                class="h-16 w-16 rounded-lg border border-sky-200 object-cover ring-1 ring-sky-100"
              />
              <button
                type="button"
                (click)="removeNewLogo()"
                class="absolute -right-1 -top-1 flex h-5 w-5 items-center justify-center rounded-full bg-slate-900 text-xs text-white transition hover:bg-slate-700"
                aria-label="Eliminar nuevo logo"
              >
                ×
              </button>
            </div>
          </div>
        }
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="onCancel()"
          class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800"
        >
          {{ isEditing ? 'Guardar cambios' : 'Agregar marca' }}
        </button>
      </div>
    </form>
  </div>
</div>

<section class="mx-auto max-w-7xl">
  <div class="page-header">
    <div>
      <h1 class="page-title">Pedidos</h1>
      <p class="page-subtitle">Consulta y gestiona los pedidos recibidos en THE LAKE.</p>
    </div>

    <div>
      <label for="order-status-filter" class="sr-only">Filtrar por estado</label>
      <select
        id="order-status-filter"
        [value]="statusFilter()"
        (change)="onStatusFilterChange($event)"
        class="filter-select rounded-lg px-3 py-2 text-sm accent-focus"
      >
        @for (option of statusFilterOptions; track option.value) {
          <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>
  </div>

  @if (error()) {
    <div
      class="mt-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
      role="alert"
    >
      {{ error() }}
    </div>
  }

  <div class="mt-6">
    <app-data-table
      [columns]="tableColumns()"
      [rows]="filteredOrders()"
      [loading]="loading()"
      loadingMessage="Cargando pedidos..."
      emptyMessage="No hay pedidos registrados."
      [trackBy]="trackOrder"
      (edit)="openDetail($event)"
      (delete)="deleteOrder($event)"
    />
  </div>
</section>

@if (showDetail() && selectedOrder()) {
  <app-order-detail-dialog
    [order]="selectedOrder()!"
    (submitted)="onOrderSubmitted($event)"
    (cancelled)="closeDetail()"
  />
}

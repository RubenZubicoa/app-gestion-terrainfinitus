<section class="mx-auto max-w-7xl">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-slate-900">Productos</h1>
      <p class="mt-1 text-sm text-slate-600">Gestiona el catálogo de productos de THE LAKE.</p>
    </div>

    <button
      type="button"
      (click)="openAddForm()"
      class="inline-flex items-center justify-center gap-2 rounded-lg bg-slate-900 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-slate-800 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
    >
      <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path
          d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z"
        />
      </svg>
      Agregar producto
    </button>
  </div>

  @if (error()) {
    <div
      class="mt-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
      role="alert"
    >
      {{ error() }}
    </div>
  }

  <div class="mt-6">
    <app-data-table
      [columns]="tableColumns()"
      [rows]="products()"
      [loading]="loading()"
      loadingMessage="Cargando productos..."
      emptyMessage="No hay productos registrados."
      [trackBy]="trackProduct"
      (edit)="openEditForm($event)"
      (delete)="deleteProduct($event)"
    />
  </div>
</section>

@if (showForm()) {
  <app-product-form-dialog
    [product]="editingProduct()"
    [brands]="brands()"
    [categories]="categories()"
    (saved)="onProductSaved()"
    (cancelled)="closeForm()"
  />
}

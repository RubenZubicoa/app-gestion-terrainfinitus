<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="isEditing ? 'Editar producto' : 'Agregar producto'"
>
  <div class="max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-xl border border-slate-200 bg-white p-6 shadow-xl">
    <h2 class="text-lg font-semibold text-slate-900">
      {{ isEditing ? 'Editar producto' : 'Agregar producto' }}
    </h2>

    <form class="mt-4 space-y-4" [formGroup]="form" (submit)="onSubmit($event)">
      <div>
        <label for="product-name" class="block text-sm font-medium text-slate-700">Nombre</label>
        <input
          id="product-name"
          type="text"
          formControlName="name"
          class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
        />
      </div>

      <div>
        <label for="product-description" class="block text-sm font-medium text-slate-700">
          Descripción
        </label>
        <textarea
          id="product-description"
          formControlName="description"
          rows="3"
          class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
        ></textarea>
      </div>

      <div class="grid gap-4 sm:grid-cols-2">
        <div>
          <label for="product-price" class="block text-sm font-medium text-slate-700">Precio</label>
          <input
            id="product-price"
            type="number"
            min="0"
            step="0.01"
            formControlName="price"
            class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
          />
        </div>

        <div>
          <label for="product-stock" class="block text-sm font-medium text-slate-700">Stock</label>
          <input
            id="product-stock"
            type="number"
            min="0"
            formControlName="stock"
            class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
          />
        </div>
      </div>

      <div class="grid gap-4 sm:grid-cols-2">
        <div>
          <label for="product-brand" class="block text-sm font-medium text-slate-700">Marca</label>
          <select
            id="product-brand"
            formControlName="brandId"
            class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
          >
            <option value="">Seleccionar marca</option>
            @for (brand of brands(); track brand.uuid) {
              <option [value]="brand.uuid">{{ brand.name }}</option>
            }
          </select>
        </div>

        <div>
          <label for="product-category" class="block text-sm font-medium text-slate-700">
            Categoría
          </label>
          <select
            id="product-category"
            formControlName="categoryId"
            class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
          >
            <option value="">Seleccionar categoría</option>
            @for (category of categories(); track category.uuid) {
              <option [value]="category.uuid">{{ category.label }}</option>
            }
          </select>
        </div>
      </div>

      <div>
        <label for="product-images" class="block text-sm font-medium text-slate-700">
          Imágenes (URLs separadas por coma)
        </label>
        <textarea
          id="product-images"
          formControlName="images"
          rows="2"
          placeholder="https://ejemplo.com/imagen1.jpg, https://ejemplo.com/imagen2.jpg"
          class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
        ></textarea>

        @if (previewImages().length > 0) {
          <div class="mt-3">
            <p class="text-xs font-medium uppercase tracking-wide text-slate-500">Vista previa</p>
            <ul class="mt-2 flex gap-2 overflow-x-auto pb-1">
              @for (url of previewImages(); track url) {
                <li
                  class="h-16 w-16 shrink-0 overflow-hidden rounded-lg border border-slate-200 bg-slate-50"
                  [title]="url"
                >
                  @if (isImageBroken(url)) {
                    <div
                      class="flex h-full w-full flex-col items-center justify-center p-1 text-center text-[10px] leading-tight text-slate-500"
                    >
                      <svg
                        class="h-4 w-4 text-slate-400"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="1.5"
                        aria-hidden="true"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0 0 22.5 18.75V5.25A2.25 2.25 0 0 0 20.25 3H3.75A2.25 2.25 0 0 0 1.5 5.25v13.5A2.25 2.25 0 0 0 3.75 21Z"
                        />
                      </svg>
                      <span>Error</span>
                    </div>
                  } @else {
                    <img
                      [src]="url"
                      alt="Vista previa de imagen del producto"
                      class="h-full w-full object-cover"
                      (error)="onImageError(url)"
                    />
                  }
                </li>
              }
            </ul>
          </div>
        }
      </div>

      @if (error()) {
        <p class="text-sm text-red-600" role="alert">{{ error() }}</p>
      }

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="onCancel()"
          class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="saving()"
          class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800 disabled:cursor-not-allowed disabled:opacity-60"
        >
          {{ saving() ? 'Guardando...' : isEditing ? 'Guardar cambios' : 'Agregar producto' }}
        </button>
      </div>
    </form>
  </div>
</div>

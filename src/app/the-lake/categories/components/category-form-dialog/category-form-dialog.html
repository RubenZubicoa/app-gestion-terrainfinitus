<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4"
  role="dialog"
  aria-modal="true"
  [attr.aria-label]="dialogTitle"
>
  <div class="max-h-[90vh] w-full max-w-lg overflow-y-auto rounded-xl border border-slate-200 bg-white p-6 shadow-xl">
    <h2 class="text-lg font-semibold text-slate-900">{{ dialogTitle }}</h2>

    <form class="mt-4 space-y-4" [formGroup]="form" (submit)="onSubmit($event)">
      @if (!isParentMode) {
        <div>
          <label for="category-parent" class="block text-sm font-medium text-slate-700">
            Categoría padre
          </label>
          <select
            id="category-parent"
            formControlName="parentCategoryId"
            class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
          >
            <option value="">Seleccionar categoría</option>
            @for (parent of parentCategories(); track parent.uuid) {
              <option [value]="parent.uuid">{{ parent.label }}</option>
            }
          </select>
        </div>
      }

      <div>
        <label for="category-label" class="block text-sm font-medium text-slate-700">Nombre</label>
        <input
          id="category-label"
          type="text"
          formControlName="label"
          class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
        />
      </div>

      <div>
        <label for="category-description" class="block text-sm font-medium text-slate-700">
          Descripción
        </label>
        <textarea
          id="category-description"
          formControlName="description"
          rows="3"
          class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-slate-900"
        ></textarea>
      </div>

      @if (isParentMode) {
        <div>
          <div class="flex items-center justify-between">
            <span class="text-sm font-medium text-slate-700">Subcategorías</span>
            <button
              type="button"
              (click)="addSubcategory()"
              class="rounded-lg border border-slate-300 px-3 py-1.5 text-xs font-medium text-slate-700 transition hover:bg-slate-50"
            >
              Añadir subcategoría
            </button>
          </div>

          @if (subcategories().length === 0) {
            <p class="mt-2 text-xs text-slate-500">Esta categoría no tiene subcategorías.</p>
          } @else {
            <ul class="mt-3 space-y-3">
              @for (subcategory of subcategories(); track $index; let index = $index) {
                <li class="rounded-lg border border-slate-200 bg-slate-50 p-3">
                  <div class="flex items-start justify-between gap-2">
                    <span class="text-xs font-medium uppercase tracking-wide text-slate-500">
                      Subcategoría {{ index + 1 }}
                    </span>
                    <button
                      type="button"
                      (click)="removeSubcategory(index)"
                      class="text-xs font-medium text-red-600 transition hover:text-red-700"
                    >
                      Eliminar
                    </button>
                  </div>
                  <input
                    type="text"
                    [value]="subcategory.label"
                    (input)="updateSubcategoryLabel(index, $any($event.target).value)"
                    placeholder="Nombre de la subcategoría"
                    class="mt-2 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900"
                  />
                  <input
                    type="text"
                    [value]="subcategory.description"
                    (input)="updateSubcategoryDescription(index, $any($event.target).value)"
                    placeholder="Descripción (opcional)"
                    class="mt-2 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900"
                  />
                </li>
              }
            </ul>
          }
        </div>
      }

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="onCancel()"
          class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-50"
        >
          Cancelar
        </button>
        <button
          type="submit"
          class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white transition hover:bg-slate-800"
        >
          {{ submitLabel }}
        </button>
      </div>
    </form>
  </div>
</div>

<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50 p-4"
  role="dialog"
  aria-modal="true"
  aria-label="Cambiar contraseña"
>
  <div class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-6 shadow-xl">
    <h2 class="text-lg font-semibold text-slate-900">Cambiar contraseña</h2>
    <p class="mt-1 text-sm text-slate-600">
      Nueva contraseña para
      <span class="font-medium text-slate-800">{{ userFullName }}</span>
      ({{ user().email }}).
    </p>

    <form class="mt-4 space-y-4" [formGroup]="form" (submit)="onSubmit($event)">
      <div>
        <label for="new-password" class="block text-sm font-medium text-slate-700">
          Nueva contraseña
        </label>
        <input
          id="new-password"
          type="password"
          formControlName="password"
          autocomplete="new-password"
          placeholder="Mínimo 6 caracteres"
          class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 accent-focus"
        />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <p class="mt-1.5 text-xs text-red-600">Introduce una contraseña de al menos 6 caracteres.</p>
        }
      </div>

      <div>
        <label for="confirm-password" class="block text-sm font-medium text-slate-700">
          Confirmar contraseña
        </label>
        <input
          id="confirm-password"
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          class="mt-1 block w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 accent-focus"
        />
        @if (passwordsMismatch) {
          <p class="mt-1.5 text-xs text-red-600">Las contraseñas no coinciden.</p>
        }
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <button type="button" (click)="onCancel()" class="btn-secondary px-4 py-2">
          Cancelar
        </button>
        <button type="submit" class="btn-primary px-4 py-2">Guardar contraseña</button>
      </div>
    </form>
  </div>
</div>

<section class="mx-auto max-w-7xl">
  <div class="page-header">
    <div>
      <h1 class="page-title">Usuarios</h1>
      <p class="page-subtitle">
        Gestiona quién puede acceder al back-office. Esta lista es compartida por todos los
        proyectos.
      </p>
    </div>

    <button type="button" (click)="openAddForm()" class="btn-primary">
      <svg class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path
          d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5Z"
        />
      </svg>
      Agregar usuario
    </button>
  </div>

  @if (error()) {
    <div
      class="mt-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700"
      role="alert"
    >
      {{ error() }}
    </div>
  }

  <div class="mt-6">
    <app-data-table
      [columns]="tableColumns()"
      [rows]="users()"
      [loading]="loading()"
      loadingMessage="Cargando usuarios..."
      emptyMessage="No hay usuarios registrados."
      [trackBy]="trackUser"
      [showChangePassword]="true"
      (edit)="openEditForm($event)"
      (changePassword)="openChangePasswordForm($event)"
      (delete)="deleteUser($event)"
    />
  </div>
</section>

@if (showForm()) {
  <app-user-form-dialog
    [user]="editingUser()"
    (submitted)="onUserSubmitted($event)"
    (cancelled)="closeForm()"
  />
}

@if (showPasswordForm() && passwordUser()) {
  <app-change-password-dialog
    [user]="passwordUser()!"
    (submitted)="onPasswordSubmitted($event)"
    (cancelled)="closePasswordForm()"
  />
}

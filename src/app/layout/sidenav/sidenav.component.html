<nav class="app-sidebar flex h-full min-h-0 w-64 flex-col" aria-label="Navegación principal">
  <div class="sidebar-header px-4 py-5">
    <p class="sidebar-subtitle text-xs font-semibold uppercase tracking-wide">Secciones</p>
    <p class="mt-1 truncate text-sm font-semibold">
      {{ projectContext.selectedProject().name }}
    </p>
  </div>

  <ul class="flex-1 space-y-1 p-3">
    @for (section of projectContext.selectedSections(); track section.id) {
      <li>
        <a
          [routerLink]="section.path"
          routerLinkActive="nav-link-active"
          class="nav-link flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-slate-700 transition accent-focus"
          [routerLinkActiveOptions]="{ exact: section.path === '/dashboard' }"
        >
          <svg
            class="h-4 w-4 shrink-0 text-slate-500"
            viewBox="0 0 20 20"
            fill="currentColor"
            aria-hidden="true"
          >
            <path [attr.d]="iconPath(section.icon)" />
          </svg>
          {{ section.label }}
        </a>
      </li>
    }
  </ul>
</nav>
